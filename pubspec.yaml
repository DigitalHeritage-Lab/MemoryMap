name: empty_template
description: "An empty Flutter project template."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.1 <4.0.0"

dependencies:
  bloc: ^9.1.0
  cached_network_image: ^3.4.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^7.0.2
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  freezed_annotation: ^3.1.0
  geolocator: ^13.0.1
  get_it: ^9.0.5
  go_router: ^17.0.0
  injectable: ^2.6.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  latlong2: ^0.9.1
  skeletonizer: ^2.1.3
  stream_transform: ^2.1.1
  supabase_flutter: ^2.8.0

dev_dependencies:
  build_runner: ^2.10.1
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  injectable_generator: ^2.9.1
  json_serializable: ^6.11.1
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
