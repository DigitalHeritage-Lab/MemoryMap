name: Test and Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy_supabase.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy_supabase.yml'

jobs:
  test-migrations:
    name: Verify Migrations (Local Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase start requires Docker. GitHub-hosted runners have Docker pre-installed.
      - name: Start Supabase Local Stack (Applies Migrations)
        run: supabase start

      - name: Verify Database Reset
        run: supabase db reset

  deploy-migrations:
    name: Deploy Migrations to Production
    needs: test-migrations
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations to production
        run: |
          supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --db-password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
