name: Test and Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - '.github/workflows/deploy_supabase.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - '.github/workflows/deploy_supabase.yml'

jobs:
  test-migrations:
    name: Verify Migrations & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase start requires Docker. GitHub-hosted runners have Docker pre-installed.
      - name: Start Supabase Local Stack (Applies Migrations)
        run: supabase start

      - name: Verify Database Reset
        run: supabase db reset

      - name: Verify Presence of Database Tests
        run: |
          if [ ! -d "supabase/tests" ] || [ -z "$(find supabase/tests -type f -name '*.sql')" ]; then
            echo "Error: No database test files (*.sql) found under supabase/tests/!"
            exit 1
          fi
          echo "Database test files found."

      - name: Run Database Tests (pgTAP)
        run: supabase db test

  deploy-migrations:
    name: Deploy Migrations to Production
    needs: test-migrations
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy migrations to production
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
