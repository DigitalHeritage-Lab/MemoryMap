name: Flutter CI

# Тригери: коли саме запускати автоматизацію
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Запускаємо на віртуальній машині з Ubuntu
    runs-on: ubuntu-latest

    steps:
      # 1. Стягуємо код репозиторію на віртуальну машину
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Встановлюємо Java (необхідно для збірки Android)
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Встановлюємо Flutter (з фіксацією версії для стабільності CI)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Кешування прискорює наступні запуски

      # 4. Завантажуємо залежності (packages)
      - name: Install dependencies
        run: flutter pub get

      # 5. Перевіряємо якість коду (Linter)
      - name: Analyze code
        run: flutter analyze

      # 6. Запускаємо тести (додано для повноцінного CI)
      - name: Run tests
        run: |
          flutter test \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"